# Lefthook config — Fenix autonomous loop
#
# pre-commit  — cheap checks that must pass before any commit lands
# pre-push    — heavier checks before the commit hits the remote
#
# `fenix-pin-checks` is the X_PASS_X enforcer: while a phase is in
# implementation, the files pinned by its DEFINE_CHECKS commit are locked.
# `--no-verify` is not an escape — the only valid bypass is `git revert
# <CHECKS_COMMIT_SHA>` for the affected phase.

pre-commit:
  parallel: true
  jobs:
    - name: fenix-pin-checks
      run: bun scripts/fenix-pin-checks.ts
      # No `glob` filter — the script reads the staged set itself and
      # intersects it with the pinned set per active phase.

    - name: format-staged
      glob: "{apps,packages,scripts,.claude/scripts}/**/*.{ts,tsx,json,css}"
      run: bunx biome format --write {staged_files}
      stage_fixed: true

    # Reject any staged package.json that introduces a ^ or ~ version range.
    # Companion to bunfig.toml's `exact = true` — caught at commit time so
    # a hand-edit can't slip past the bun config.
    - name: pin-versions
      glob: "**/package.json"
      run: |
        if grep -nE '"[\^~][0-9]' {staged_files} ; then
          echo
          echo "✗ pin-versions: package.json must use exact versions (no ^ or ~)"
          echo "  Use \`bun add <pkg>\` (bunfig.toml pins exact) or strip the range by hand."
          exit 1
        fi

    # React Compiler memoizes automatically — manual memoization is
    # redundant and a smell. Block useMemo / useCallback / React.memo /
    # memo() from landing. Opt a single file out with 'use no memo'.
    - name: no-manual-memo
      glob: "{apps,packages}/**/*.{ts,tsx}"
      run: |
        fail=0
        # Call sites: useMemo(...), useCallback(...), React.memo(...), etc.
        if grep -nHE '\b(useMemo|useCallback)\s*\(|\bReact\.(memo|useMemo|useCallback)\s*\(' {staged_files} ; then
          fail=1
        fi
        # `import { ..., memo, ... } from 'react'` on a single line.
        if grep -nHE "import[^;]*\{[^}]*\bmemo\b[^}]*\}[^;]*from[^;]*['\"]react['\"]" {staged_files} ; then
          fail=1
        fi
        if [ $fail -eq 1 ]; then
          echo
          echo "✗ no-manual-memo: React Compiler memoizes automatically — remove useMemo / useCallback / memo / React.memo."
          echo "  To opt a single file out of the compiler, add \`'use no memo'\` as the first directive at the top."
          exit 1
        fi

    - name: biome
      run: bunx turbo lint

    - name: typecheck
      run: bunx turbo typecheck

pre-push:
  jobs:
    - name: build
      run: bunx turbo build

    - name: test
      run: bunx turbo test
