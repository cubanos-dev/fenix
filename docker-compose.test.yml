services:
  postgres:
    image: postgres:17-alpine
    container_name: fenix-test-db
    environment:
      POSTGRES_USER: fenix_test
      POSTGRES_PASSWORD: fenix_test
      POSTGRES_DB: fenix_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fenix_test -d fenix_test']
      interval: 1s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
